<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CFASwap</title>

<style>
body{
    background:#062f1f;
    font-family:Arial;
    text-align:center;
    color:white;
    padding:30px;
}

h1{
    color:#FFD700;
}

.container{
    max-width:400px;
    margin:auto;
}

input, select, button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#FFD700;
    font-weight:bold;
    cursor:pointer;
}

#result{
    margin-top:20px;
}
</style>

</head>

<body>

<h1>CFASwap</h1>
<p>Échange CFA, USD, EUR avec frais de 2%</p>

<div class="container">

<input id="amount" placeholder="Entrer le montant">

<select id="from">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="CFA">CFA</option>
</select>

<select id="to">
<option value="CFA">CFA</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
</select>

<button onclick="convert()">Convertir</button>

<div id="result"></div>

<button onclick="sendWhatsApp()">Échanger sur WhatsApp</button>

</div>

<script>

const ratesToCFA = {
USD:600,
EUR:655,
CFA:1
};

function convert(){
let amount = parseFloat(document.getElementById('amount').value);
let from = document.getElementById('from').value;
let to = document.getElementById('to').value;

let amountInCFA = amount * ratesToCFA[from];
let converted = amountInCFA / ratesToCFA[to];
let fee = converted * 0.02;
let finalAmount = converted - fee;

document.getElementById('result').innerHTML =
"Montant brut : <b>" + converted.toFixed(2) + " " + to + "</b><br>" +
"Frais (2%) : <b>" + fee.toFixed(2) + " " + to + "</b><br>" +
"Montant final : <b>" + finalAmount.toFixed(2) + " " + to + "</b>";
}

function sendWhatsApp(){
let amount = document.getElementById('amount').value;
let from = document.getElementById('from').value;
let to = document.getElementById('to').value;

let msg = "Bonjour, je veux échanger :%0A" +
"Montant: " + amount + "%0A" +
"De: " + from + "%0A" +
"Vers: " + to;

window.open("https://wa.me/22870160506?text=" + msg, "_blank");
}

</script>

</body>
</html>
