<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFASwap</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#021f17,#083d2c);
    color:white;
    text-align:center;
}

h1{
    margin-top:40px;
    color:#FFD700;
}

.subtitle{
    margin-bottom:20px;
}

.box{
    background:#0b3d2c;
    padding:20px;
    border-radius:15px;
    margin:20px;
}

input, select{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#FFD700;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
.countries{
    margin-top:20px;
}
</style>

</head>

<body>

<h1>CFASwap</h1>
<p class="subtitle">CFA • Bitcoin • Ethereum • USDT • EUR • USD</p>

<div class="box">

<input id="amount" placeholder="Entrer le montant">

<select id="from">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="CFA">CFA</option>
</select>

<select id="to">
<option value="CFA">CFA</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
</select>

<button onclick="convert()">Convertir</button>

<div id="result"></div>

</div>

<div class="countries">
<p>🌍 Afrique de l’Ouest & Centrale</p>
<p>🇹🇬 🇨🇲 🇨🇬 🇸🇳 🇨🇮 🇧🇯 🇲🇱 🇧🇫</p>
</div>

<script>

const ratesToCFA = {
USD:600,
EUR:655,
CFA:1
};

function convert(){
let raw = document.getElementById('amount').value;
let amount = parseFloat(raw);

if(!amount){
document.getElementById('result').innerHTML="Entre un montant valide";
return;
}

let from = document.getElementById('from').value;
let to = document.getElementById('to').value;

let amountInCFA = amount * ratesToCFA[from];
let converted = amountInCFA / ratesToCFA[to];
let fee = converted * 0.02;
let finalAmount = converted - fee;

document.getElementById('result').innerHTML =
"Montant brut : <b>"+converted.toFixed(2)+" "+to+"</b><br>"+
"Frais : <b>"+fee.toFixed(2)+" "+to+"</b><br>"+
"Montant final : <b>"+finalAmount.toFixed(2)+" "+to+"</b>";
}

</script>

</body>
</html>
